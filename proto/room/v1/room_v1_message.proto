syntax = "proto3";

package table_net.room.v1;

import "google/protobuf/empty.proto";
import "common/common_message.proto";

option csharp_namespace = "TableNet.Room.V1";

message CreateRoomRequest {
  string name = 1;
}

message CreateRoomResult {
  oneof result {
    CreateRoomSuccess success = 1;
    common.InvalidRequestErrors invalidRequest = 2;
    
    
  }
}

message CreateRoomSuccess {
  Room room = 1;
}

message Room {
  bytes roomId = 1;
  string name = 2;
}

message JoinRoomRequest {
  uint64 roomId = 1;
}

message JoinRoomResult {
  oneof result {
    google.protobuf.Empty success = 1;
    common.InvalidRequestErrors invalidRequest = 2;
    JoinRoomState fail = 3;
  }
}

enum JoinRoomState {
  NotFound = 0;
}